<div class="dashboard-container">
  <header class="dash-header">
    <div class="header-top">
      <div class="header-brand">
        <span class="brand-dot"></span>
        <span class="brand-label">Travel Planner</span>
      </div>
      <div class="header-user">
        <span class="user-email">{{ userEmail }}</span>
        <button class="btn-logout" (click)="logout()">Sair</button>
      </div>
    </div>
    <h1>As Minhas <em>Viagens</em></h1>
    <p>Organiza o teu próximo destino com detalhe e estilo.</p>
  </header>

  <main class="grid-container">
    <div class="card add-card" (click)="toggleAddForm()" *ngIf="!showAddForm">
      <div class="add-card-inner">
        <div class="add-icon-ring"><span>+</span></div>
        <h3>Nova Viagem</h3>
        <p>Começa a planear</p>
      </div>
    </div>

    <div class="card form-card" *ngIf="showAddForm">
      <div class="custom-input-group">
        <span class="input-icon">✈️</span>
        <input
          type="text"
          [(ngModel)]="newItineraryName"
          placeholder="Ex: Eurotrip 2025"
          (keyup.enter)="createItinerary()"
          autofocus
        />
      </div>

      <app-date-range-picker
        [startDate]="newItineraryStart"
        [endDate]="newItineraryEnd"
        (rangeChange)="onRangeChange($event)"
      >
      </app-date-range-picker>

      <div class="form-actions">
        <button class="btn-cancel" (click)="toggleAddForm()">Cancelar</button>
        <button
          class="btn-save"
          (click)="createItinerary()"
          [disabled]="
            newItineraryName.length < 2 || !newItineraryStart || !newItineraryEnd || saving
          "
        >
          {{ saving ? 'A criar...' : 'Criar' }}
        </button>
      </div>
    </div>

    <a
      *ngFor="let trip of itineraries"
      [routerLink]="['/itinerario', trip.id]"
      class="card trip-card"
    >
      <div class="card-image-full">
        <ng-container *ngIf="getCityImages(trip.id).length > 0; else placeholderTpl">
          <div class="city-mosaic">
            <div
              *ngFor="let img of getCityImages(trip.id)"
              class="mosaic-strip"
              [style.backgroundImage]="'url(' + img + ')'"
            ></div>
          </div>
        </ng-container>
        <ng-template #placeholderTpl>
          <div class="placeholder-bg"></div>
        </ng-template>
      </div>
      <div class="card-overlay">
        <span class="date-label" *ngIf="trip.startDate && trip.endDate">
          {{ trip.startDate | date: 'dd/MM/yyyy' }} – {{ trip.endDate | date: 'dd/MM/yyyy' }}
        </span>
        <h3>{{ trip.name }}</h3>
        <span class="go-link">Ver destino →</span>
      </div>
    </a>
  </main>
</div>
